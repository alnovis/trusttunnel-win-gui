name: Release

# Borrowed structure from nebula's release.yml (tag trigger, validate,
# changelog extraction, softprops/action-gh-release). The Docker/media/deploy
# jobs are dropped -- here we cross-build a Windows binary and attach it.

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # 1. Validate the portable core (Windows-only modules are cfg'd out on Linux).
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test

  # 2. Build the real Windows binaries (this also compiles the Windows-only
  #    code) with the matching-arch engine + wintun.dll embedded, so each asset
  #    is a single self-contained exe. i686 asset -> 32-bit Windows; x86_64
  #    asset -> 64-bit Windows (the Wintun kernel driver must match the OS, so a
  #    32-bit build does NOT cover 64-bit Windows).
  #    NB: MSVC-built binaries target modern Windows; the Windows 7 runtime is
  #    still to be validated on hardware -- switch to *-pc-windows-gnu if needed.
  build:
    name: Build (${{ matrix.arch }})
    needs: validate
    runs-on: windows-latest
    # Pinned engine release the embedded binaries come from
    # (keep in sync with bootstrap::ENGINE_VERSION).
    env:
      ENGINE_VERSION: "1.0.23"
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86_64-pc-windows-msvc
          - arch: i686
            target: i686-pc-windows-msvc
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Fetch engine (trusttunnel_client + wintun.dll) for embedding
        shell: pwsh
        run: |
          $ver = "${env:ENGINE_VERSION}"
          $arch = "${{ matrix.arch }}"
          $zip = "trusttunnel_client-v$ver-windows-$arch.zip"
          $url = "https://github.com/TrustTunnel/TrustTunnelClient/releases/download/v$ver/$zip"
          Write-Output "Downloading $url"
          Invoke-WebRequest -Uri $url -OutFile $zip
          Expand-Archive -Force -Path $zip -DestinationPath extracted
          $dest = "vendor/$arch"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          foreach ($f in @('trusttunnel_client.exe','wintun.dll','LICENSE.txt','WINTUN_LICENSE.txt')) {
            Copy-Item -Force "extracted/$f" "$dest/$f"
          }
          Get-ChildItem $dest | Select-Object Name,Length

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --features embed-engine

      - name: Stage artifact
        shell: pwsh
        run: |
          $name = "trusttunnel-gui-${{ github.ref_name }}-windows-${{ matrix.arch }}.exe"
          Copy-Item "target/${{ matrix.target }}/release/trusttunnel-gui.exe" $name
          Write-Output "Staged $name"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trusttunnel-gui-${{ matrix.arch }}
          path: trusttunnel-gui-*.exe
          if-no-files-found: error

  # 3. Publish the GitHub Release with both binaries attached.
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for version
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          if [ -f CHANGELOG.md ]; then
            awk "/## \[${VERSION}\]/{flag=1; next} /## \[/{flag=0} flag" CHANGELOG.md > release_notes.txt
          fi
          if [ ! -s release_notes.txt ]; then
            printf 'Release v%s\n\nSingle self-contained exe (engine + wintun.dll built in). Download the\nbuild matching your Windows: x86_64 for 64-bit, i686 for 32-bit.\n\nNot code-signed: Windows will warn "unknown publisher" -- choose\nMore info -> Run anyway. Verify the .sha256 if you like.\n' "$VERSION" > release_notes.txt
          fi
          echo "Release notes:"; cat release_notes.txt

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate SHA-256 checksums
        run: |
          cd dist
          for f in *.exe; do
            sha256sum "$f" > "$f.sha256"
          done
          sha256sum *.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: v${{ steps.version.outputs.VERSION }}
          body_path: release_notes.txt
          draft: false
          prerelease: false
          files: |
            dist/*.exe
            dist/*.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Release

# Borrowed structure from nebula's release.yml (tag trigger, validate,
# changelog extraction, softprops/action-gh-release). The Docker/media/deploy
# jobs are dropped -- here we cross-build a Windows binary and attach it.

on:
  push:
    tags:
      - 'v*.*.*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # 1. Validate the portable core (Windows-only modules are cfg'd out on Linux).
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test

  # 2. Build the real Windows binaries (this also compiles the Windows-only
  #    code). i686 covers 32-bit Windows 7; x86_64 covers 64-bit.
  #    NB: MSVC-built binaries target modern Windows; the Windows 7 runtime is
  #    still to be validated on hardware -- switch to *-pc-windows-gnu if needed.
  build:
    name: Build (${{ matrix.arch }})
    needs: validate
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            target: x86_64-pc-windows-msvc
          - arch: i686
            target: i686-pc-windows-msvc
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact
        shell: pwsh
        run: |
          $name = "trusttunnel-gui-${{ github.ref_name }}-windows-${{ matrix.arch }}.exe"
          Copy-Item "target/${{ matrix.target }}/release/trusttunnel-gui.exe" $name
          Write-Output "Staged $name"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trusttunnel-gui-${{ matrix.arch }}
          path: trusttunnel-gui-*.exe
          if-no-files-found: error

  # 3. Publish the GitHub Release with both binaries attached.
  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Extract changelog for version
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          if [ -f CHANGELOG.md ]; then
            awk "/## \[${VERSION}\]/{flag=1; next} /## \[/{flag=0} flag" CHANGELOG.md > release_notes.txt
          fi
          if [ ! -s release_notes.txt ]; then
            printf 'Release v%s\n\nRequires the TrustTunnel engine (trusttunnel_client.exe) and a\nmatching wintun.dll next to the GUI, or set the engine path in Settings.\n' "$VERSION" > release_notes.txt
          fi
          echo "Release notes:"; cat release_notes.txt

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: v${{ steps.version.outputs.VERSION }}
          body_path: release_notes.txt
          draft: false
          prerelease: false
          files: dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
